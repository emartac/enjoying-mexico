{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card shadow-sm">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-building me-2"></i>{{ titulo }}</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% crispy form %}
        </form>
      </div>
    </div>
    <div class="mt-2">
      <a href="{% url 'hoteles:lista' %}" class="text-secondary"><i class="bi bi-arrow-left me-1"></i>Volver a la lista</a>
    </div>
  </div>
</div>
{% endblock %}
