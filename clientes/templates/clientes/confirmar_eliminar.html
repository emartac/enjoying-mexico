{% extends 'base.html' %}
{% block titulo %}Eliminar cliente{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación</h5>
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5">¿Estás seguro de que deseas eliminar al cliente</p>
        <p class="fs-4 fw-bold">{{ objeto }}</p>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 me-2">
            <i class="bi bi-trash me-1"></i>Sí, eliminar
          </button>
          <a href="{% url 'clientes:lista' %}" class="btn btn-secondary px-4">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
