<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Enjoying Mexico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .login-card { max-width: 400px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card w-100 mx-3">
  <div class="text-center mb-4">
    <i class="bi bi-airplane-fill text-primary fs-1"></i>
    <h4 class="mt-2 fw-bold">Enjoying Mexico</h4>
    <p class="text-muted small">Sistema de Reservaciones</p>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title mb-4">Iniciar sesión</h5>

      {% if form.errors %}
        <div class="alert alert-danger">
          Usuario o contraseña incorrectos.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Usuario</label>
          <input type="text" name="username" id="id_username"
                 class="form-control" autofocus autocomplete="username" required>
        </div>
        <div class="mb-3">
          <label for="id_password" class="form-label">Contraseña</label>
          <input type="password" name="password" id="id_password"
                 class="form-control" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
